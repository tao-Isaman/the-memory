<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ออฟไลน์ - The Memory</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Kanit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fffbf7;
        color: #6b5e57;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 360px; }
      .heart {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        display: block;
      }
      h1 { font-size: 22px; color: #e63946; margin-bottom: 10px; }
      p { font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
      button {
        border: none;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        color: #fff;
        padding: 12px 28px;
        border-radius: 9999px;
        background: linear-gradient(135deg, #ff6b9d 0%, #e63946 100%);
        box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="heart" viewBox="0 0 24 24" fill="#e63946" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
      </svg>
      <h1>ไม่มีการเชื่อมต่ออินเทอร์เน็ต</h1>
      <p>ดูเหมือนว่าตอนนี้คุณออฟไลน์อยู่ กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วลองใหม่อีกครั้ง</p>
      <button onclick="location.reload()">ลองอีกครั้ง</button>
    </div>
  </body>
</html>
